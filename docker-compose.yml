version: "3.9"

services:
  app:
    build: .
    container_name: rag_app
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - sqlserver
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DB_CONNECTION=Driver={ODBC Driver 18 for SQL Server};Server=sqlserver;Database=DemoDB;UID=sa;PWD=KSAcs321;TrustServerCertificate=yes;
    volumes:
      - .:/app

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /c/Users/qalab.abbas/.ollama:/root/.ollama

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=KSAcs321
    ports:
      - "1434:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  ollama_data:
  sql_data: